name: Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run engine regression tests
        run: python3 -m unittest discover -s tests -v
      - name: Build and verify application bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION%-community-preview}"
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          FULLSPECTRUM_VERSION="$VERSION" FULLSPECTRUM_BUILD="${GITHUB_RUN_NUMBER}" ./script/build_and_run.sh build
          codesign --verify --deep --strict --verbose=2 "dist/FullSpectrum Studio.app"
      - name: Create macOS ZIP
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION%-community-preview}"
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "dist/FullSpectrum Studio.app" "release/FullSpectrum-Studio-macOS-v${VERSION}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: FullSpectrum-Studio-macOS
          path: release/*

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install packaging dependencies
        run: pip install -r requirements-windows.txt
      - name: Run engine regression tests
        run: python -m unittest discover -s tests -v
      - name: Build portable application
        run: >
          pyinstaller --noconfirm --windowed
          --name FullSpectrumStudio
          --hidden-import fullspectrum_engine
          --hidden-import bambu_mixer_model
          --hidden-import json
          --hidden-import csv
          --hidden-import hashlib
          --hidden-import math
          --hidden-import re
          --hidden-import shutil
          --hidden-import struct
          --hidden-import subprocess
          --hidden-import tempfile
          --hidden-import zipfile
          --hidden-import xml.etree.ElementTree
          --hidden-import array
          --hidden-import pathlib
          --hidden-import itertools
          --hidden-import collections
          --hidden-import functools
          --add-data "fullspectrum_engine.py;."
          --add-data "bambu_mixer_model.py;."
          --add-data "LICENSE;."
          --add-data "THIRD_PARTY_NOTICES.md;."
          desktop/full_spectrum_studio.py
      - name: Create portable ZIP
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', '' -replace '-community-preview$', ''
          if ($env:GITHUB_REF_TYPE -ne 'tag') {
            $version = "dev-$($env:GITHUB_SHA.Substring(0, 7))"
          }
          New-Item -ItemType Directory -Force release
          Compress-Archive -Path dist/FullSpectrumStudio/* -DestinationPath "release/FullSpectrum-Studio-Windows-Portable-v$version.zip" -Force
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', '' -replace '-community-preview$', ''
          if ($env:GITHUB_REF_TYPE -ne 'tag') {
            $version = "dev-$($env:GITHUB_SHA.Substring(0, 7))"
          }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" packaging/windows/FullSpectrumStudio.iss
      - uses: actions/upload-artifact@v4
        with:
          name: FullSpectrum-Studio-Windows
          path: release/*

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: FullSpectrum-Studio-*
          path: release
          merge-multiple: true
      - name: Create or repair community preview release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION%-community-preview}"
          NOTES_FILE="docs/RELEASE_NOTES_${VERSION}.md"
          if [[ ! -f "$NOTES_FILE" ]]; then
            NOTES_FILE="docs/RELEASE_NOTES_0.4.3.md"
          fi
          TITLE="FullSpectrum Studio v${VERSION} Community Preview"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --prerelease \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE"
            gh release upload "$GITHUB_REF_NAME" release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/* \
              --prerelease \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE"
          fi
