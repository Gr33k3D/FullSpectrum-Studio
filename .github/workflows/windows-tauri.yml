name: Windows Tauri Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "apps/windows-tauri/**"
      - ".github/workflows/windows-tauri.yml"

permissions:
  contents: read

jobs:
  windows-tauri:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/windows-tauri

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/windows-tauri/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Check Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri Windows installer
        run: npm run tauri:build

      - name: Upload Tauri bundles
        uses: actions/upload-artifact@v4
        with:
          name: FullSpectrum-Studio-Windows-Tauri
          path: |
            apps/windows-tauri/src-tauri/target/release/bundle/msi/*
            apps/windows-tauri/src-tauri/target/release/*.exe
          if-no-files-found: warn
